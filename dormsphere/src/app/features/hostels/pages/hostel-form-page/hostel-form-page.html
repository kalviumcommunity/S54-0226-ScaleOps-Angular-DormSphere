<div class="bg-background-light text-slate-900 font-display relative flex min-h-screen flex-col dark:bg-background-dark dark:text-slate-100">
  <app-hostel-navbar />

  <main class="mx-auto w-full max-w-4xl flex-1 px-6 py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-extrabold tracking-tight">Add New Hostel</h1>
      <p class="text-slate-500 mt-1">Create a new hostel and make it available in the Hostels list and detail flow.</p>
    </div>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900"
    >
      <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
        <label class="flex flex-col gap-2 text-sm font-semibold">
          Hostel Name
          <input
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="name"
            placeholder="Example: Riverfront Hall"
            type="text"
          />
        </label>

        <label class="flex flex-col gap-2 text-sm font-semibold">
          Location
          <input
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="location"
            placeholder="Example: North Campus"
            type="text"
          />
        </label>

        <label class="flex flex-col gap-2 text-sm font-semibold">
          Hostel Type
          <select
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="type"
          >
            @for (type of types; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </label>

        <label class="flex flex-col gap-2 text-sm font-semibold">
          Status
          <select
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="status"
          >
            @for (status of statuses; track status) {
              <option [value]="status">{{ status }}</option>
            }
          </select>
        </label>

        <label class="flex flex-col gap-2 text-sm font-semibold">
          Warden Name
          <input
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="wardenName"
            placeholder="Example: Dr. Hannah Lee"
            type="text"
          />
        </label>

        <label class="flex flex-col gap-2 text-sm font-semibold">
          Warden Extension
          <input
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="wardenExtension"
            placeholder="Example: 4432"
            type="text"
          />
        </label>

        <label class="flex flex-col gap-2 text-sm font-semibold">
          Capacity
          <input
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="capacity"
            type="number"
          />
        </label>

        <label class="flex flex-col gap-2 text-sm font-semibold">
          Occupied Beds
          <input
            class="focus:ring-primary rounded-lg border border-slate-300 bg-slate-50 px-3 py-2.5 focus:outline-none focus:ring-2"
            formControlName="occupiedBeds"
            type="number"
          />
        </label>
      </div>

      <div class="mt-8 flex flex-wrap gap-3">
        <button
          class="bg-primary inline-flex items-center gap-2 rounded-lg px-5 py-2.5 text-sm font-bold text-white shadow-lg transition-opacity hover:opacity-90"
          type="submit"
        >
          <span class="material-symbols-outlined text-lg">save</span>
          Save Hostel
        </button>

        <a
          class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50"
          routerLink="/hostels"
        >
          <span class="material-symbols-outlined text-lg">close</span>
          Cancel
        </a>
      </div>
    </form>
  </main>
</div>
