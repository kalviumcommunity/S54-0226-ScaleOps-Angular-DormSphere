services:
  postgres:
    image: postgres:15
    container_name: dormsphere_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hostel_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: dormsphere_backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-hostel_db}
      PORT: ${PORT:-8000}
      AUTH_LOGIN_USERNAME: ${AUTH_LOGIN_USERNAME:-admin@university.edu}
      AUTH_LOGIN_PASSWORD: ${AUTH_LOGIN_PASSWORD:-admin@university.edu}
    ports:
      - "8000:8000"

volumes:
  postgres_data: