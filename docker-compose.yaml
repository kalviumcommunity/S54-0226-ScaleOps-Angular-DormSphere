services:
  postgres:
    image: postgres:15
    container_name: dormsphere_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hostel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: dormsphere_backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://admin:password@postgres:5432/hostel_db
      PORT: 8000
    ports:
      - "8000:8000"

volumes:
  postgres_data: